<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Detalhes dos Filhotes</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link rel="stylesheet" href="/assets/images/css/style.css">
</head>
<body class="details-page">
	<header class="hero-banner">
		<div class="hero-inner">
			<h1>Detalhes dos Filhotes</h1>
			<div class="hero-actions">
				<a href="/index.html" class="btn-ghost">Voltar para vitrine</a>
				<a href="/cadastroCliente.html" class="btn-primary">Entrar na fila</a>
			</div>
		</div>
	</header>

	<main class="app-shell">
		<section class="detail-layout">
			<article class="detail-card">
				<div id="detalheSelecionado" class="details-hero"></div>
			</article>

			<aside class="summary-box">
				<h2>Como adotar</h2>
				<p class="section-note">Após escolher o filhote dísponivel, faça seu cadastro para receber contato da equipe.</p>
				<div class="card-actions">
					<a id="ctaCadastro" href="/cadastroCliente.html" class="btn-primary">Cadastre-se</a>
					<a href="/cadastrofilhotes.html" class="btn-soft">cadastre um filhote</a>
				</div>
			</aside>
		</section>

		<section class="table-panel details-list-panel">
			<h2>Todos os filhotes da vitrine</h2>
			<div id="listaDetalhes" class="puppy-grid"></div>
		</section>
	</main>

	<footer class="page-footer">
		<p>&copy; 2026 Gerenciamento de pet shop para filhotes todos os direitos reservados.</p>
	</footer>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
	<script src="/assets/js/detalhes.js"></script>
</body>
</html>
