<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Cliente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="/assets/images/css/style.css">
</head>
<body class="puppy-form-page">
  <header class="hero-banner">
    <div class="hero-inner">
      <h2>BEM VINDO!</h2>
      <p>
        Realize seu cadastro para interesses em filhotes.
      </p>
      <div class="hero-actions">
        <a href="/index.html" class="btn-ghost">Voltar para a vitrine</a>
      </div>
    </div>
  </header>

  <main class="app-shell">
    <section class="form-layout">
      <form id="formInteressado" class="form-grid" method="POST" action="/cadastroInteressado">
        <input type="hidden" id="interessadoEditandoId" value="">

        <div class="field">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" name="nome" placeholder="Ex.: Carla Almeida" required>
        </div>

        <div class="field">
          <label for="telefone">Telefone</label>
          <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" pattern="^\(\d{2}\)\s?\d{4,5}-\d{4}$" title="Informe um telefone valido com DDD, ex.: (41) 99999-9999" required>
        </div>

        <div class="field">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="nome@email.com" required>
        </div>

        <div class="field">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" pattern="^\d{3}\.\d{3}\.\d{3}-\d{2}$" title="Informe um CPF valido, ex.: 123.456.789-09" required>
        </div>

        <div class="field full">
          <label for="observacoes">Observações</label>
          <textarea id="observacoes" name="observacoes" rows="5"></textarea>
        </div>

        <div class="field full">
          <label for="termo">
            <input type="checkbox" id="termo" name="termo" required>
            Confirmo que as informações podem ser usadas para organizar a fila de espera.
          </label>
        </div>

        <div class="form-actions full">
          <button type="submit" id="btnSalvarInteressado" class="btn-primary">Registrar interessado</button>
          <button type="button" id="btnCancelarEdicao" class="btn-ghost">Cancelar edição</button>
        </div>
      </form>

      <section class="table-panel" aria-live="polite">
        <h2>Interessados cadastrados</h2>
        <div class="table-wrap">
          <table class="waitlist-table" id="tabelaInteressados">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>CPF</th>
                <th>Telefone</th>
                <th>E-mail</th>
                <th>Filhotes vinculados</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <p id="mensagemInteressados" class="section-note"></p>
      </section>

    </section>
  </main>

  <footer class="page-footer">
    <p>&copy;2026 Gerenciamento de pet shop para filhotes todos os direitos reservados.</p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="/assets/js/cadastroCliente.js"></script>
</body>
</html>
