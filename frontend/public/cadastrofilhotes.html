<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cadastro de Filhotes</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link rel="stylesheet" href="/assets/images/css/style.css">
</head>
<body class="puppy-form-page">
	<header class="hero-banner">
		<div class="hero-inner">
			<h2>CADASTRO DE FILHOTES</h2>
			<p>
				Cadastre filhotes.
			</p>
			<div class="hero-actions">
				<a href="/index.html" class="btn-ghost">Voltar para a vitrine</a>
				<a href="/cadastroCliente.html" class="btn-soft">Cadastro de interessados</a>
			</div>
		</div>
	</header>

	<main class="app-shell">
		<section class="form-layout">
			<form id="formFilhote" class="form-grid">
				<input type="hidden" id="filhoteEditandoId" value="">

				<div class="field">
					<label for="especie">Especie</label>
					<input type="text" id="especie" name="especie" placeholder="Ex.: Canina" required>
				</div>

				<div class="field">
					<label for="raca">Raca</label>
					<input type="text" id="raca" name="raca" placeholder="Ex.: Spitz Alemao" required>
				</div>

				<div class="field full">
					<label for="interessadoVinculado">Interessado</label>
					<select id="interessadoVinculado" name="interessadoVinculado">
						<option value="">Nenhum interessado vinculado</option>
					</select>
				</div>

				<div class="form-actions full">
					<button type="submit" id="btnSalvarFilhote" class="btn-primary">Registrar filhote</button>
					<button type="button" id="btnCancelarFilhote" class="btn-ghost">Cancelar edição</button>
				</div>
			</form>

			<section class="table-panel" aria-live="polite">
				<h2>Filhotes cadastrados</h2>
				<div class="table-wrap">
					<table class="puppy-table" id="tabelaFilhotes">
						<thead>
							<tr>
								<th>nome</th>
								<th>Especie</th>
								<th>Raca</th>
								<th>Interessado</th>
								<th>Acoes</th>
							</tr>
						</thead>
						<tbody></tbody>
					</table>
				</div>
				<p id="mensagemFilhotes" class="section-note"></p>
			</section>
		</section>
	</main>

	<footer class="page-footer">
		<p>&copy;2026 Gerenciamento de pet shop para filhotes todos os direitos reservados.</p>
	</footer>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
	<script src="/assets/js/cadastroFilhotes.js"></script>
</body>
</html>
